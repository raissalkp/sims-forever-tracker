name: Test and build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y python3-tk
          pip install -r requirements.txt
      - name: Run tests
        run: python -m unittest discover -s tests -v

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: SimsTracker-windows.exe
            flags: --onefile --noconsole
          - os: macos-latest
            artifact: SimsTracker-macos
            flags: --onefile --windowed
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: pyinstaller ${{ matrix.flags }} --name SimsTracker sims_tracker.py

      - name: Rename (Windows)
        if: runner.os == 'Windows'
        run: Move-Item dist/SimsTracker.exe dist/${{ matrix.artifact }}

      - name: Rename (macOS)
        if: runner.os == 'macOS'
        run: mv dist/SimsTracker dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
          generate_release_notes: true
